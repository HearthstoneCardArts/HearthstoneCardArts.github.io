<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hearthstone Card Arts</title>
<link rel="stylesheet" href="style.css"></head>
<link rel="icon" href="logo.png">
<body>
<div class="search-container">
<img src="logo.png" alt="Hearthstone Art Search" class="search-image">

<form id="searchForm" class="search-form">
  <svg class="search-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
  </svg>
  <input 
    type="text" 
    class="search-input" 
    id="cardName" 
    placeholder="For example:" 
    autocomplete="off"
    required
  >
  <button type="submit" class="search-button" id="searchBtn">
    Search
  </button>
</form>

<div id="loading" class="loading" style="display: none;">Searching...</div>
<div id="errorMessage" class="error-message"></div>

<div class="art-result" id="artResult">
  <img src="" alt="Card Art" class="art-image" id="artImage">
  <div class="art-name" id="artName"></div>
  <a href="" target="_blank" class="art-link" id="artLink">Open in new tab</a>
</div>

<div class="misc-text">
<a href="https://github.com/HearthstoneCardArts/HearthstoneCardArts.github.io">Source code</a><br>
powered by hearthstonejson api 💙
</div>
</div>

<script src="search.js"></script>
</body>
</html>
